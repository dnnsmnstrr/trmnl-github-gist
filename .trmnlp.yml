# TRMNLP configuration
# {{ env.VARIABLE }} interpolation is available here
---
# auto-reload when files change (`watch: false` to disable)
watch:
  - .trmnlp.yml
  - src

# values of custom fields (defined in src/settings.yml)
custom_fields:
  file_name: trmnl.md # change the file ending to .json to try out the json parsing
  gist_id: "{{ env.TRMNL_GIST_ID }}"
  gist_token: "{{ env.TRMNL_GIST_TOKEN }}"
  image_url: https://www.svgrepo.com/show/361175/gist.svg

# override variables
variables:
  trmnl: {}
